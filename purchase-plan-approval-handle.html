    .pph .carrier-main-inner { padding: 12px 14px 20px; max-width: 1100px; margin: 0 auto; }

      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 10px;
    }
    .pph-toolbar-left { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .pph-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 32px;
      padding: 0 16px;
      font-size: 13px;
      border-radius: 4px;
      cursor: pointer;
      border: 1px solid #d9d9d9;
      background: #fff;
      color: rgba(0, 0, 0, 0.88);
      font-family: inherit;
    }
    .pph-btn--primary {
      background: #1890ff;
      border-color: #1890ff;
      color: #fff;
    }
    .pph-btn--primary:hover { background: #40a9ff; border-color: #40a9ff; }
    .pph-btn--ghost:hover { border-color: #1890ff; color: #1890ff; }
    .pph-title {
      text-align: center;
      font-size: 20px;
      font-weight: 600;
      color: #1f3551;
      margin: 6px 0 14px;
      letter-spacing: 0.02em;
    }
    .pph-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 14px;
      font-size: 13px;
      color: #4c6077;
    }
    .pph-meta select {
      height: 30px;
      border: 1px solid #d9d9d9;
      border-radius: 4px;
      padding: 0 8px;
      font-size: 13px;
      color: #333;
      background: #fff;
      min-width: 120px;
    }
    .pph-form-wrap {
      background: #fff;
      border: 1px solid #e8eef5;
      border-radius: 4px;
      overflow: hidden;
    }
    .pph-grid {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
      font-size: 13px;
    }
    .pph-grid td {
      border: 1px solid #e8eef5;
      padding: 0;
      vertical-align: middle;
    }
    .pph-label {
      width: 18%;
      background: #f5f7fa;
      color: #3f5366;
      padding: 10px 12px;
      text-align: right;
      font-weight: 500;
      box-sizing: border-box;
    }
    .pph-label .req { color: #ff4d4f; margin-right: 2px; }
    .pph-cell {
      width: 32%;
      padding: 6px 10px;
      background: #fff;
      box-sizing: border-box;
    }
    .pph-cell--full { width: auto; }
    .pph-input {
      width: 100%;
      height: 32px;
      border: 1px solid #d9d9d9;
      border-radius: 4px;
      padding: 0 10px;
      font-size: 13px;
      color: #333;
      box-sizing: border-box;
      outline: none;
    }
    .pph-input:focus { border-color: #1890ff; box-shadow: 0 0 0 2px rgba(24, 144, 255, 0.12); }
    .pph-radio-row {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      min-height: 32px;
    }
    .pph-radio-row label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      font-weight: 400;
      color: #333;
    }
    .pph-upload {
      display: flex;
      justify-content: center;
      padding: 16px 12px;
      border-top: 1px solid #e8eef5;
      background: #fafbfd;
    }
    .pph-upload .pph-btn--primary {
      background: #e6f4ff;
      border-color: #91caff;
      color: #1677ff;
    }
    .pph-upload .pph-btn--primary:hover {
      background: #bae0ff;
      border-color: #69b1ff;
      color: #0958d9;
    }
    .pph-toast {
      position: fixed;
      left: 50%;
      bottom: 28px;
      transform: translateX(-50%);
      padding: 10px 18px;
      background: rgba(0, 0, 0, 0.75);
      color: #fff;
      border-radius: 6px;
      font-size: 13px;
      z-index: 10000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }
    .pph-toast.show { opacity: 1; }

    /* 审批弹窗「提示」 */
    .pph-modal-mask {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 10050;
      background: rgba(15, 25, 45, 0.45);
      backdrop-filter: blur(2px);
      align-items: center;
      justify-content: center;
      padding: 20px;
      box-sizing: border-box;
    }
    .pph-modal-mask.is-open { display: flex; }

</head>

  <script>
    (function () {
      function toast(msg) {
        var el = document.getElementById("pphToast");
        if (!el) return;
        el.textContent = msg;
        el.classList.add("show");
        clearTimeout(toast._t);
        toast._t = setTimeout(function () {
          el.classList.remove("show");
        }, 2200);
      }
      var modal = document.getElementById("pphApproveModal");
      function openApproveModal() {
        if (!modal) return;
        modal.classList.add("is-open");
        modal.setAttribute("aria-hidden", "false");
        document.body.style.overflow = "hidden";
        try {
          var ta = document.getElementById("pphOpinion");
          if (ta) setTimeout(function () { ta.focus(); }, 100);
        } catch (e) {}
      }
      function closeApproveModal() {
        if (!modal) return;
        modal.classList.remove("is-open");
        modal.setAttribute("aria-hidden", "true");
        document.body.style.overflow = "";
      }
      document.getElementById("pphBtnApprove").addEventListener("click", openApproveModal);
      document.getElementById("pphModalCloseX").addEventListener("click", closeApproveModal);
      document.getElementById("pphModalCancel").addEventListener("click", closeApproveModal);
      modal.addEventListener("click", function (e) {
        if (e.target === modal) closeApproveModal();
      });
      document.addEventListener("keydown", function (e) {
        if (e.key === "Escape" && modal && modal.classList.contains("is-open")) closeApproveModal();
      });
      document.getElementById("pphModalPickFile").addEventListener("click", function () {
        document.getElementById("pphModalFile").click();
      });
      document.getElementById("pphModalFile").addEventListener("change", function () {
        var n = this.files && this.files.length;
        toast(n ? "已选择 " + n + " 个附件（演示）" : "未选择文件");
      });
      document.getElementById("pphCcAdd").addEventListener("click", function () {
        toast("演示：选择抄送人");
      });
      document.getElementById("pphQuickTags").addEventListener("click", function (e) {
        var btn = e.target.closest(".pph-tag");
        if (!btn) return;
        var t = btn.getAttribute("data-text") || "";
        var ta = document.getElementById("pphOpinion");
        if (!ta || !t) return;
        var cur = ta.value.trim();
        ta.value = cur ? cur + " " + t : t;
      });
      var ftLabels = {
        submit: "提交",
        delegate: "委托",
        transfer: "转办",
        terminate: "终止",
        return: "退回"
      };
      modal.querySelector(".pph-modal-ft").addEventListener("click", function (e) {
        var b = e.target.closest("[data-pph-ft]");
        if (!b) return;
        var k = b.getAttribute("data-pph-ft");
        if (k === "return" || k === "terminate") {
          toast("演示：" + (ftLabels[k] || k) + "（原型未接后端）");
          closeApproveModal();
          return;
        }
        if (k === "submit") {
          toast("演示：已提交审批意见（原型）");
          closeApproveModal();
          return;
        }
        toast("演示：" + (ftLabels[k] || k) + "（原型）");
      });
      document.getElementById("pphBtnTrack").addEventListener("click", function () {
        toast("演示：打开流程轨迹");
      });
      document.getElementById("pphPickFile").addEventListener("click", function () {
        document.getElementById("pphFile").click();
      });
      document.getElementById("pphFile").addEventListener("change", function () {
        var n = this.files && this.files.length;
        toast(n ? "已选择 " + n + " 个文件（演示）" : "未选择文件");
      });
      try {
        var sp = new URLSearchParams(window.location.search);
        var no = sp.get("no");
        if (no) {
          document.getElementById("pphFormNo").textContent = "表单编号：" + no;
        }
      } catch (e) {}
    })();
  </script>
</body>
</html>
