<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>项目公司验收/货物质量验收 - 新能源物资供应链管理系统</title>
  <link rel="stylesheet" href="css/vendor/fa-all.min.css" />
  <link rel="stylesheet" href="css/subpage-base.css" />
  <link rel="stylesheet" href="css/carrier-management.css" />
  <link rel="stylesheet" href="css/source-navbar-header.css" />
  <style>
    /* 保证中文按横向单行显示，避免窄列时逐字换行看起来像“竖排” */
    .carrier-table{table-layout:auto;min-width:1320px}
    .carrier-table thead th,.carrier-table tbody td{white-space:nowrap;word-break:keep-all}
    .carrier-table thead th{min-width:96px}
    .carrier-table thead th:last-child,.carrier-table tbody td:last-child{min-width:180px}
    .q-mask{position:fixed;inset:0;background:rgba(0,0,0,.35);display:none;align-items:center;justify-content:center;z-index:2600}
    .q-mask.show{display:flex}
    .q-box{width:min(560px,94vw);background:#fff;border-radius:10px;overflow:hidden}
    .q-hd{padding:12px 16px;border-bottom:1px solid #edf2f8;font-weight:600}
    .q-bd{padding:12px 16px}
    .q-ft{padding:10px 16px;border-top:1px solid #edf2f8;display:flex;justify-content:flex-end;gap:8px}
    .q-row{display:grid;grid-template-columns:110px 1fr;gap:8px;align-items:center;margin-bottom:8px;font-size:13px}
    .q-row input,.q-row select{height:30px;border:1px solid #d9d9d9;border-radius:4px;padding:0 8px}
  </style>
</head>
<body class="page-source-navbar page-subpage page-logistics">
  <div class="page-bg" aria-hidden="true"></div>
  <div class="app">
    <header class="header"><div class="header-left"><button class="header-hamburger"><svg viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16"/></svg></button><a class="header-logo" href="#"><img src="assets/logo-chenergy.png" width="220" height="40" alt=""/></a><div class="header-source-brand"><p>新能源供应链管理系统</p></div></div><div class="header-right"><span class="clock" id="clock"></span><div class="user-avatar">用</div></div></header>
    <div class="layout"><aside class="sidebar"><div class="nav-item nav-item--module-active"><span class="nav-label">采购管理</span></div></aside><main class="main-scroll"><div class="carrier-main-inner">
      <h1 class="carrier-page-title">项目公司验收/货物质量验收（XQ-PROC-7）</h1>
      <div class="carrier-toolbar"><button class="carrier-btn-add" id="btnUpload"><i class="fa-solid fa-file-arrow-up"></i> 上传验收报告</button><div class="carrier-toolbar-right"><input class="carrier-search" placeholder="验收编号/关联发货"/><select class="carrier-select"><option>全部状态</option><option>待验收</option><option>通过</option><option>不通过</option></select><button class="carrier-btn-add">查询</button></div></div>
      <div class="carrier-table-wrap"><table class="carrier-table"><thead><tr><th>验收编号</th><th>关联发货</th><th>验收数量</th><th>验收状态</th><th>验收报告</th><th>验收人</th><th>验收时间</th><th>已执行数量更新</th><th>操作</th></tr></thead><tbody id="tb">
        <tr><td>QA-2026-201</td><td>FH-2026-101</td><td>30</td><td><span class="tag-status tag-status--in-use">通过</span></td><td>report-QA-2026-201.pdf</td><td>天津能源-李工</td><td>2026-04-15 16:30</td><td>+30</td><td><a href="#" style="color:#1677ff;text-decoration:none;font-weight:500" data-a="redo">不通过重发货</a></td></tr>
        <tr><td>QA-2026-202</td><td>FH-2026-106</td><td>12</td><td><span class="tag-status tag-status--to-shelf">待验收</span></td><td>-</td><td>-</td><td>-</td><td>0</td><td><a href="#" style="color:#1677ff;text-decoration:none;font-weight:500" data-a="pass">验收通过</a> / <a href="#" style="color:#cf1322;text-decoration:none;font-weight:500" data-a="redo">验收不通过</a></td></tr>
      </tbody></table></div>
    </div></main></div>
  </div>
  <div class="q-mask" id="qMask"><div class="q-box"><div class="q-hd">项目公司验收</div><div class="q-bd" id="qBody"></div><div class="q-ft"><button class="carrier-btn-add" id="qCancel">取消</button><button class="carrier-btn-add" id="qOk">确认提交</button></div></div></div>
  <script src="js/sidebar-actions.js"></script><script src="js/subpage-feature-title.js"></script><script src="js/subpage-clock.js"></script>
  <script>
    (function(){
      var cur=null,mode="pass",mask=document.getElementById("qMask"),body=document.getElementById("qBody");
      function close(){mask.classList.remove("show");cur=null;}
      document.getElementById("qCancel").onclick=close;
      mask.onclick=function(e){ if(e.target===mask) close(); };
      document.getElementById("btnUpload").addEventListener("click", function () {
        alert("已上传验收报告（演示），可继续执行通过/不通过。");
      });
      document.getElementById("tb").addEventListener("click", function (e) {
        var pass = e.target.closest("[data-a='pass']");
        var a = e.target.closest("[data-a='redo']");
        if (!a && !pass) return;
        e.preventDefault();
        cur = e.target.closest("tr");
        mode = pass ? "pass" : "redo";
        body.innerHTML = '<div class="q-row"><span>验收编号</span><b>'+cur.children[0].textContent+'</b></div>'
          +'<div class="q-row"><span>关联发货</span><span>'+cur.children[1].textContent+'</span></div>'
          +'<div class="q-row"><span>验收数量</span><input id="qQty" type="number" min="1" value="'+cur.children[2].textContent+'"/></div>'
          +'<div class="q-row"><span>验收结论</span><select id="qResult"><option value="pass">通过</option><option value="redo">不通过</option></select></div>'
          +'<div class="q-row"><span>验收报告</span><input id="qReport" value="'+(cur.children[4].textContent==='-'?'report-'+cur.children[0].textContent+'.pdf':cur.children[4].textContent)+'"/></div>';
        document.getElementById("qResult").value = mode;
        mask.classList.add("show");
      });
      document.getElementById("qOk").onclick=function(){
        if(!cur) return;
        var q = Number(document.getElementById("qQty").value || 0);
        var rs = document.getElementById("qResult").value;
        var rp = (document.getElementById("qReport").value || "").trim() || "-";
        if(q<=0){ alert("验收数量必须大于0"); return; }
        cur.children[2].textContent = q;
        cur.children[4].textContent = rp;
        if (rs === "pass") {
          cur.children[3].innerHTML = '<span class="tag-status tag-status--in-use">通过</span>';
          cur.children[5].textContent = "项目公司-验收人";
          cur.children[6].textContent = new Date().toISOString().slice(0,16).replace("T"," ");
          cur.children[7].textContent = "+" + q;
          cur.children[8].innerHTML = '<span style="color:#8c8c8c">已完成</span>';
        } else {
          cur.children[3].innerHTML = '<span class="tag-status tag-status--isolate">不通过</span>';
          cur.children[7].textContent = "0";
          cur.children[8].innerHTML = '<a href="proc-shipment.html" style="color:#cf1322;text-decoration:none;font-weight:500">进入重新发货</a>';
        }
        close();
      };
    })();
  </script>
</body>
</html>
