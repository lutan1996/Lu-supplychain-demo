<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>发货管理 - 新能源物资供应链管理系统</title>
  <link rel="stylesheet" href="css/vendor/fa-all.min.css" />
  <link rel="stylesheet" href="css/subpage-base.css" />
  <link rel="stylesheet" href="css/carrier-management.css" />
  <link rel="stylesheet" href="css/source-navbar-header.css" />
  <style>
    .s-mask{position:fixed;inset:0;background:rgba(0,0,0,.35);display:none;align-items:center;justify-content:center;z-index:2600}
    .s-mask.show{display:flex}
    .s-box{width:min(560px,94vw);background:#fff;border-radius:10px;overflow:hidden}
    .s-hd{padding:12px 16px;border-bottom:1px solid #edf2f8;font-weight:600}
    .s-bd{padding:12px 16px}
    .s-ft{padding:10px 16px;border-top:1px solid #edf2f8;display:flex;justify-content:flex-end;gap:8px}
    .s-row{display:grid;grid-template-columns:110px 1fr;gap:8px;align-items:center;margin-bottom:8px;font-size:13px}
    .s-row input{height:30px;border:1px solid #d9d9d9;border-radius:4px;padding:0 8px}
  </style>
</head>
<body class="page-source-navbar page-subpage page-logistics">
  <div class="page-bg" aria-hidden="true"></div>
  <div class="app">
    <header class="header"><div class="header-left"><button class="header-hamburger"><svg viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16"/></svg></button><a class="header-logo" href="#"><img src="assets/logo-chenergy.png" width="220" height="40" alt=""/></a><div class="header-source-brand"><p>新能源供应链管理系统</p></div></div><div class="header-right"><span class="clock" id="clock"></span><div class="user-avatar">用</div></div></header>
    <div class="layout"><aside class="sidebar"><div class="nav-item nav-item--module-active"><span class="nav-label">采购管理</span></div></aside><main class="main-scroll"><div class="carrier-main-inner">
      <h1 class="carrier-page-title">发货管理（XQ-PROC-6）</h1>
      <div class="carrier-toolbar"><button class="carrier-btn-add"><i class="fa-solid fa-plus"></i> 新增发货单</button><div class="carrier-toolbar-right"><input class="carrier-search" placeholder="发货编号/关联订单"/><select class="carrier-select"><option>全部状态</option><option>待发货</option><option>已发货</option></select><button class="carrier-btn-add">查询</button></div></div>
      <div class="carrier-table-wrap"><table class="carrier-table"><thead><tr><th>发货编号</th><th>关联订单</th><th>发货数量</th><th>收货单位</th><th>发货状态</th><th>剩余执行数量</th><th>发货确认人</th><th>发货时间</th><th>操作</th></tr></thead><tbody id="tb">
        <tr><td>FH-2026-101</td><td>ORD2026001</td><td>30</td><td>天津能源</td><td><span class="tag-status tag-status--to-shelf">待发货</span></td><td>70</td><td>-</td><td>-</td><td><button class="carrier-btn-add" data-a="ship">发货出库</button> <a href="#" data-a="trace" style="color:#1677ff;text-decoration:none;font-weight:500">查看物流</a></td></tr>
      </tbody></table></div>
    </div></main></div>
  </div>
  <div class="s-mask" id="shipMask"><div class="s-box"><div class="s-hd">发货出库确认</div><div class="s-bd" id="shipBody"></div><div class="s-ft"><button class="carrier-btn-add" id="shipCancel">取消</button><button class="carrier-btn-add" id="shipOk">确认发货</button></div></div></div>
  <script src="js/sidebar-actions.js"></script><script src="js/subpage-feature-title.js"></script><script src="js/subpage-clock.js"></script>
  <script>
    (function(){
      var cur=null,mask=document.getElementById("shipMask"),body=document.getElementById("shipBody");
      function close(){mask.classList.remove("show");cur=null;}
      document.getElementById("shipCancel").onclick=close;
      mask.onclick=function(e){ if(e.target===mask) close(); };
      document.getElementById("tb").addEventListener("click", function (e) {
        if (e.target.getAttribute("data-a") === "trace") { e.preventDefault(); alert("已打开物流轨迹（演示）"); return; }
        if (e.target.getAttribute("data-a") !== "ship") return;
        cur = e.target.closest("tr");
        body.innerHTML = '<div class="s-row"><span>发货编号</span><b>'+cur.children[0].textContent+'</b></div>'
          +'<div class="s-row"><span>关联订单</span><span>'+cur.children[1].textContent+'</span></div>'
          +'<div class="s-row"><span>发货数量</span><input id="shipQty" type="number" min="1" value="'+cur.children[2].textContent+'"/></div>'
          +'<div class="s-row"><span>收货单位</span><span>'+cur.children[3].textContent+'</span></div>'
          +'<div class="s-row"><span>剩余执行</span><span id="remainNum">'+cur.children[5].textContent+'</span></div>';
        mask.classList.add("show");
      });
      document.getElementById("shipOk").onclick=function(){
        if(!cur) return;
        var q = Number(document.getElementById("shipQty").value || 0);
        var r = Number(cur.children[5].textContent || 0);
        if(q<=0){ alert("发货数量必须大于0"); return; }
        if(q>r){ alert("发货数量不能大于剩余执行数量"); return; }
        cur.children[2].textContent = q;
        cur.children[4].innerHTML = '<span class="tag-status tag-status--in-use">已发货</span>';
        cur.children[5].textContent = Math.max(0, r - q);
        cur.children[6].textContent = "当前用户";
        cur.children[7].textContent = new Date().toISOString().slice(0,16).replace("T"," ");
        cur.children[8].innerHTML = '<span style="color:#8c8c8c">已完成</span>';
        close();
      };
    })();
  </script>
</body>
</html>
