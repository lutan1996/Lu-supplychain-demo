<!-- 来源: src/views/system/brand/index.vue -->
<!-- 已移除 Vue 指令与 {}，仅作静态结构参考 -->

<div class="p-2">
    <transition>
      <div class="mb-[10px]">
        <el-card shadow="hover">
          <el-form>
            <el-form-item label="品牌" prop="brand">
              <el-input placeholder="请输入品牌" clearable />
            </el-form-item>
            <el-form-item>
              <el-button type="primary" icon="Search">搜索</el-button>
              <el-button icon="Refresh">重置</el-button>
            </el-form-item>
          </el-form>
        </el-card>
      </div>
    </transition>

    <el-card shadow="never">
      <template>
        <el-row class="mb8">
          <el-col>
            <el-button type="primary" plain icon="Plus">新增</el-button>
          </el-col>
          <el-col>
            <el-button type="success" plain icon="Edit">修改</el-button>
          </el-col>
          <el-col>
            <el-button type="danger" plain icon="Delete">删除</el-button>
          </el-col>
          <el-col>
            <el-button type="warning" plain icon="Download">导出</el-button>
          </el-col>
          <right-toolbar></right-toolbar>
        </el-row>
      </template>

      <el-table>
        <el-table-column type="selection" width="55" align="center" />
        <el-table-column label="品牌" align="center" prop="brand" />
        <el-table-column label="操作" align="center" class-name="small-padding fixed-width">
          <template="scope">
            <el-tooltip content="修改" placement="top">
              <el-button link type="primary" icon="Edit"></el-button>
            </el-tooltip>
            <el-tooltip content="删除" placement="top">
              <el-button link type="primary" icon="Delete"></el-button>
            </el-tooltip>
          </template>
        </el-table-column>
      </el-table>

      <pagination />
    </el-card>
    <!-- 添加或修改品牌对话框 -->
    <el-dialog width="500px" append-to-body>
      <el-form label-width="80px">
        <el-form-item label="品牌" prop="brand">
          <el-input placeholder="请输入品牌" />
        </el-form-item>
      </el-form>
      <template>
        <div class="dialog-footer">
          <el-button type="primary">确 定</el-button>
          <el-button>取 消</el-button>
        </div>
      </template>
    </el-dialog>
  </div>
