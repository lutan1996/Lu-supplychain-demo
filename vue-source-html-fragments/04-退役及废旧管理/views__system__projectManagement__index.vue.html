<!-- 来源: src/views/system/projectManagement/index.vue -->
<!-- 已移除 Vue 指令与 {}，仅作静态结构参考 -->

<div class="p-2">
    <transition>
      <div class="mb-[10px]">
        <el-card shadow="hover">
          <el-form>
            <el-form-item label="区域公司" prop="regionalCompanies">
              <el-input placeholder="请输入区域公司" clearable />
            </el-form-item>
            <el-form-item label="项目名称" prop="projectName">
              <el-input placeholder="请输入项目名称" clearable />
            </el-form-item>
            <el-form-item>
              <el-button type="primary" icon="Search">搜索</el-button>
              <el-button icon="Refresh">重置</el-button>
            </el-form-item>
          </el-form>
        </el-card>
      </div>
    </transition>

    <el-card shadow="never">
      <template>
        <el-row class="mb8">
          <el-col>
            <el-button type="primary" plain icon="Plus">新增</el-button>
          </el-col>
          <el-col>
            <el-button type="success" plain icon="Edit">修改</el-button>
          </el-col>
          <el-col>
            <el-button type="danger" plain icon="Delete">删除</el-button>
          </el-col>
          <el-col>
            <el-button type="warning" plain icon="Download">导出</el-button>
          </el-col>
          <right-toolbar></right-toolbar>
        </el-row>
      </template>

      <el-table>
        <el-table-column type="selection" width="55" align="center" />
        <!-- <el-table-column label="主键" align="center" prop="id" /> -->
        <el-table-column label="区域公司" align="center" prop="regionalCompanies" min-width="120px"/>
        <el-table-column label="项目名称" align="center" prop="projectName" />
        <el-table-column label="项目投产时间" align="center" prop="projectCommissioningTime" />
        <el-table-column label="项目拟拆除时间" align="center" prop="projectProposedDemolitionTime" />
        <el-table-column label="项目简介" align="center" prop="projectIntroduction" min-width="200px"/>
        
        <el-table-column label="操作" align="center" class-name="small-padding fixed-width">
          <template="scope">
            <el-tooltip content="修改" placement="top">
              <el-button link type="primary" icon="Edit"></el-button>
            </el-tooltip>
            <el-tooltip content="删除" placement="top">
              <el-button link type="primary" icon="Delete"></el-button>
            </el-tooltip>
          </template>
        </el-table-column>
      </el-table>

      <pagination />
    </el-card>
    <!-- 添加或修改项目管理对话框 -->
    <el-dialog  width="500px" append-to-body>
      <el-form label-width="auto">
        <el-form-item label="区域公司" prop="regionalCompanies">
          <!-- <el-input placeholder="请输入区域公司" /> -->
          <el-select placeholder="请选择区域公司">
            <el-option />
          </el-select>
        </el-form-item>
        <el-form-item label="项目名称" prop="projectName">
          <el-input placeholder="请输入项目名称" />
        </el-form-item>
        <el-form-item label="项目投产时间" prop="projectCommissioningTime">
          <el-date-picker
            type="datetime"
            placeholder="请选择项目投产时间"
            format="YYYY-MM-DD hh:mm:ss"
            value-format="YYYY-MM-DD h:m:s"
          />
        </el-form-item>
        <el-form-item label="项目拟拆除时间" prop="projectProposedDemolitionTime">
          <el-date-picker
            type="datetime"
            placeholder="请选择项目拟拆除时间"
            format="YYYY-MM-DD hh:mm:ss"
            value-format="YYYY-MM-DD h:m:s"
          />
        </el-form-item>
        <el-form-item label="项目简介" prop="projectIntroduction">
          <el-input
            style="width: 240px"
            type="textarea"
            placeholder="请输入项目简介"
          />
        </el-form-item>
      </el-form>
      <template>
        <div class="dialog-footer">
          <el-button type="primary">确 定</el-button>
          <el-button>取 消</el-button>
        </div>
      </template>
    </el-dialog>
  </div>
