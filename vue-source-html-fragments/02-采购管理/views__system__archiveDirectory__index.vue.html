        <el-card shadow="hover">
          <el-form>
            <el-form-item label="目录名称" prop="archiveName">
              <el-input placeholder="请输入目录名称" clearable />
            </el-form-item>
            <el-form-item label="表单类型" prop="userName">

            <el-form-item>

          </el-form>

          </el-col>
          <el-col>
            <el-button type="warning" plain icon="Download">导出</el-button>
          </el-col>

        <el-table-column label="目录名称" align="left" prop="archiveName">
          <template>
            <div style="text-align: left">目录名称</div>
          </template>
          <template="scope">
            <div style="text-align: left">（动态文本）</div>
          </template>
        </el-table-column>
        <!-- <el-table-column label="表单类型" align="center" prop="tableType" /> -->

        <!-- <el-table-column label="用户名称" align="center" prop="userName">

            <div style="text-align: center">（动态文本）</div>
          </template>
        </el-table-column> -->

        <!-- <el-table-column label="路径" align="center" prop="path" /> -->

        <el-table-column label="操作" align="center" class-name="small-padding fixed-width">
          <template="scope">
            <el-tooltip content="查看" placement="top">
              <el-button link type="primary" size="small" icon="View"></el-button>
            </el-tooltip>
            <!-- <el-tooltip content="修改" placement="top">
              <el-button link type="primary" icon="Edit"></el-button>

            </el-tooltip> -->

        </el-table-column>
      </el-table>

    <el-dialog width="500px" append-to-body>
      <el-form label-width="80px">
        <el-form-item label="目录名称" prop="archiveName">
          <el-input placeholder="请输入目录名称" />
        </el-form-item>
        <el-col>
            <el-form-item label="父目录">
              <el-tree-select
