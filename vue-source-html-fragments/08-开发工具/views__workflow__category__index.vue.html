<!-- 来源: src/views/workflow/category/index.vue -->
<!-- 已移除 Vue 指令与 {}，仅作静态结构参考 -->

<div class="p-2">
    <transition>
      <div class="search">
        <el-form>
          <el-form-item label="分类名称" prop="categoryName">
            <el-input placeholder="请输入分类名称" clearable />
          </el-form-item>
          <el-form-item label="分类编码" prop="categoryCode">
            <el-input placeholder="请输入分类编码" clearable />
          </el-form-item>
          <el-form-item>
            <el-button type="primary" icon="Search">搜索</el-button>
            <el-button icon="Refresh">重置</el-button>
          </el-form-item>
        </el-form>
      </div>
    </transition>

    <el-card shadow="never">
      <template>
        <el-row class="mb8">
          <el-col>
            <el-button type="primary" plain icon="Plus">新增</el-button>
          </el-col>
          <el-col>
            <el-button type="info" plain icon="Sort">展开/折叠</el-button>
          </el-col>
          <right-toolbar></right-toolbar>
        </el-row>
      </template>
      <el-table
        row-key="id"
      >
        <el-table-column label="分类名称" prop="categoryName" />
        <el-table-column label="分类编码" align="center" prop="categoryCode" />
        <el-table-column label="排序" align="center" prop="sortNum" />
        <el-table-column label="操作" align="center" class-name="small-padding fixed-width">
          <template="scope">
            <el-tooltip content="修改" placement="top">
              <el-button link type="primary" icon="Edit" />
            </el-tooltip>
            <el-tooltip content="新增" placement="top">
              <el-button link type="primary" icon="Plus" />
            </el-tooltip>
            <el-tooltip content="删除" placement="top">
              <el-button link type="primary" icon="Delete" />
            </el-tooltip>
          </template>
        </el-table-column>
      </el-table>
    </el-card>
    <!-- 添加或修改流程分类对话框 -->
    <el-dialog width="500px" append-to-body>
      <el-form label-width="80px">
        <el-form-item label="父级分类" prop="parentId">
          <el-tree-select
            value-key="id"
            placeholder="请选择父级id"
            check-strictly
          />
        </el-form-item>
        <el-form-item label="分类名称" prop="categoryName">
          <el-input placeholder="请输入分类名称" />
        </el-form-item>
        <el-form-item label="分类编码" prop="categoryCode">
          <el-input placeholder="请输入分类编码" />
        </el-form-item>
        <el-form-item label="排序" prop="sortNum">
          <el-input-number placeholder="请输入排序" controls-position="right" />
        </el-form-item>
      </el-form>
      <template>
        <div class="dialog-footer">
          <el-button type="primary">确 定</el-button>
          <el-button>取 消</el-button>
        </div>
      </template>
    </el-dialog>
  </div>
