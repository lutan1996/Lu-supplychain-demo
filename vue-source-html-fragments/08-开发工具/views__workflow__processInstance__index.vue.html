<!-- 来源: src/views/workflow/processInstance/index.vue -->
<!-- 已移除 Vue 指令与 {}，仅作静态结构参考 -->

<div class="p-2">
    <el-row>
      <!-- 流程分类树 -->
      <el-col style="">
        <el-card shadow="hover">
          <el-input placeholder="请输入流程分类名" prefix-icon="Search" clearable />
          <el-tree
            class="mt-2"
            node-key="id"
            highlight-current
            default-expand-all
          ></el-tree>
        </el-card>
      </el-col>
      <el-col>
        <div class="mb-[10px]">
          <el-card shadow="hover" class="text-center">
            <el-radio-group>
              <el-radio-button value="running">运行中</el-radio-button>
              <el-radio-button value="finish">已完成</el-radio-button>
            </el-radio-group>
          </el-card>
        </div>
        <transition>
          <div class="mb-[10px]">
            <el-card shadow="hover">
              <el-form label-width="120px">
                <el-form-item label="流程定义名称" prop="name">
                  <el-input placeholder="请输入流程定义名称" />
                </el-form-item>
                <el-form-item label="流程定义KEY" prop="key">
                  <el-input placeholder="请输入流程定义KEY" />
                </el-form-item>
                <el-form-item>
                  <el-button type="primary" icon="Search">搜索</el-button>
                  <el-button icon="Refresh">重置</el-button>
                </el-form-item>
              </el-form>
            </el-card>
          </div>
        </transition>
        <el-card shadow="hover">
          <template>
            <el-row class="mb8">
              <el-col>
                <el-button type="danger" plain icon="Delete">删除</el-button>
              </el-col>
              <right-toolbar></right-toolbar>
            </el-row>
          </template>

          <el-table border>
            <el-table-column type="selection" width="55" align="center" />
            <el-table-column align="center" type="index" label="序号" width="60"></el-table-column>
            <el-table-column align="center" label="流程定义名称">
              <template="scope">
                <span>（动态文本）v（动态文本）.0</span>
              </template>
            </el-table-column>
            <el-table-column align="center" prop="processDefinitionKey" label="流程定义KEY"></el-table-column>
            <el-table-column align="center" prop="processDefinitionVersion" label="版本号" width="90">
              <template="scope"> v（动态文本）.0</template>
            </el-table-column>
            <el-table-column align="center" prop="isSuspended" label="状态" min-width="70">
              <template="scope">
                <el-tag type="success">激活</el-tag>
                <el-tag type="danger">挂起</el-tag>
              </template>
            </el-table-column>
            <el-table-column align="center" label="流程状态" min-width="70">
              <template="scope">
                <dict-tag></dict-tag>
              </template>
            </el-table-column>
            <el-table-column align="center" prop="startTime" label="启动时间" width="160"></el-table-column>
            <el-table-column align="center" prop="endTime" label="结束时间" width="160"></el-table-column>
            <el-table-column label="操作" align="center">
              <template="scope">
                <el-row class="mb8">
                  <el-col>
                    <el-popover trigger="click" placement="left">
                      <el-input resize="none" type="textarea" placeholder="请输入作废原因" />
                      <div style="text-align: right; margin: 5px 0px 0px 0px">
                        <el-button size="small" text>取消</el-button>
                        <el-button size="small" type="primary">确认</el-button>
                      </div>
                      <template>
                        <el-button link type="primary" size="small" icon="CircleClose">作废</el-button>
                      </template>
                    </el-popover>
                  </el-col>
                  <el-col>
                    <el-button link type="primary" size="small" icon="Delete">删除</el-button>
                  </el-col>
                </el-row>
                <el-row class="mb8">
                  <el-col>
                    <el-button link type="primary" size="small" icon="View">查看</el-button>
                  </el-col>
                </el-row>
              </template>
            </el-table-column>
          </el-table>
          <pagination
          />
        </el-card>
      </el-col>
    </el-row>
    <el-dialog width="70%">
      <el-table>
        <el-table-column fixed align="center" type="index" label="序号" width="60"></el-table-column>
        <el-table-column fixed align="center" prop="name" label="流程定义名称"></el-table-column>
        <el-table-column align="center" prop="key" label="标识Key"></el-table-column>
        <el-table-column align="center" prop="version" label="版本号" width="90">
          <template="scope"> v（动态文本）.0</template>
        </el-table-column>
        <el-table-column align="center" prop="suspensionState" label="状态" min-width="70">
          <template="scope">
            <el-tag type="success">激活</el-tag>
            <el-tag type="danger">挂起</el-tag>
          </template>
        </el-table-column>
        <el-table-column align="center" prop="deploymentTime" label="部署时间"></el-table-column>
        <el-table-column fixed="right" label="操作" align="center" width="200" class-name="small-padding fixed-width">
          <template="scope">
            <el-button link type="primary" size="small" icon="Sort">切换</el-button>
          </template>
        </el-table-column>
      </el-table>
    </el-dialog>
  </div>
