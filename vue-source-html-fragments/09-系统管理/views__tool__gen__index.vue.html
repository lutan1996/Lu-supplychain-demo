<!-- 来源: src/views/tool/gen/index.vue -->
<!-- 已移除 Vue 指令与 {}，仅作静态结构参考 -->

<div class="p-2">
    <transition>
      <div class="mb-[10px]">
        <el-card shadow="hover">
          <el-form>
            <el-form-item label="数据源" prop="dataName">
              <el-select filterable clearable placeholder="请选择/输入数据源名称">
                <el-option key="" label="全部" value="" />
                <el-option> </el-option>
              </el-select>
            </el-form-item>
            <el-form-item label="表名称" prop="tableName">
              <el-input placeholder="请输入表名称" clearable />
            </el-form-item>
            <el-form-item label="表描述" prop="tableComment">
              <el-input placeholder="请输入表描述" clearable />
            </el-form-item>
            <el-form-item label="创建时间" style="width: 308px">
              <el-date-picker
                value-format="YYYY-MM-DD"
                type="daterange"
                range-separator="-"
                start-placeholder="开始日期"
                end-placeholder="结束日期"
              ></el-date-picker>
            </el-form-item>
            <el-form-item>
              <el-button type="primary" icon="Search">搜索</el-button>
              <el-button icon="Refresh">重置</el-button>
            </el-form-item>
          </el-form>
        </el-card>
      </div>
    </transition>

    <el-card shadow="hover">
      <template>
        <el-row class="mb8">
          <el-col>
            <el-button type="primary" plain icon="Download">生成</el-button>
          </el-col>
          <el-col>
            <el-button type="info" plain icon="Upload">导入</el-button>
          </el-col>
          <el-col>
            <el-button type="success" plain icon="Edit">修改</el-button>
          </el-col>
          <el-col>
            <el-button type="danger" plain icon="Delete">
              删除
            </el-button>
          </el-col>
          <right-toolbar></right-toolbar>
        </el-row>
      </template>

      <el-table>
        <el-table-column type="selection" align="center" width="55"></el-table-column>
        <el-table-column label="序号" type="index" width="50" align="center">
          <template="scope">
            <span>（动态文本）</span>
          </template>
        </el-table-column>
        <el-table-column label="数据源" align="center" prop="dataName" />
        <el-table-column label="表名称" align="center" prop="tableName" />
        <el-table-column label="表描述" align="center" prop="tableComment" />
        <el-table-column label="实体" align="center" prop="className" />
        <el-table-column label="创建时间" align="center" prop="createTime" width="160" />
        <el-table-column label="更新时间" align="center" prop="updateTime" width="160" />
        <el-table-column label="操作" align="center" width="330" class-name="small-padding fixed-width">
          <template="scope">
            <el-tooltip content="预览" placement="top">
              <el-button link type="primary" icon="View"></el-button>
            </el-tooltip>
            <el-tooltip content="编辑" placement="top">
              <el-button link type="primary" icon="Edit"></el-button>
            </el-tooltip>
            <el-tooltip content="删除" placement="top">
              <el-button link type="primary" icon="Delete"></el-button>
            </el-tooltip>
            <el-tooltip content="同步" placement="top">
              <el-button link type="primary" icon="Refresh"></el-button>
            </el-tooltip>
            <el-tooltip content="生成代码" placement="top">
              <el-button link type="primary" icon="Download"></el-button>
            </el-tooltip>
          </template>
        </el-table-column>
      </el-table>
      <pagination />
    </el-card>

    <!-- 预览界面 -->
    <el-dialog width="80%" top="5vh" append-to-body class="scrollbar">
      <el-tabs>
        <el-tab-pane
        >
          <el-link icon="DocumentCopy" style="float: right">
            &nbsp;复制
          </el-link>
          <pre>（动态文本）</pre>
        </el-tab-pane>
      </el-tabs>
    </el-dialog>
    <import-table />
  </div>
