<!-- 来源: src/views/system/role/index.vue -->
<!-- 已移除 Vue 指令与 {}，仅作静态结构参考 -->

<div class="p-2">
    <transition>
      <div class="mb-[10px]">
        <el-card shadow="hover">
          <el-form>
            <el-form-item label="角色名称" prop="roleName">
              <el-input placeholder="请输入角色名称" clearable />
            </el-form-item>
            <el-form-item label="权限字符" prop="roleKey">
              <el-input placeholder="请输入权限字符" clearable />
            </el-form-item>
            <el-form-item label="状态" prop="status">
              <el-select placeholder="角色状态" clearable>
                <el-option />
              </el-select>
            </el-form-item>
            <el-form-item label="创建时间" style="width: 308px">
              <el-date-picker
                value-format="YYYY-MM-DD HH:mm:ss"
                type="daterange"
                range-separator="-"
                start-placeholder="开始日期"
                end-placeholder="结束日期"
              ></el-date-picker>
            </el-form-item>

            <el-form-item>
              <el-button type="primary" icon="Search">搜索</el-button>
              <el-button icon="Refresh">重置</el-button>
            </el-form-item>
          </el-form>
        </el-card>
      </div>
    </transition>

    <el-card shadow="hover">
      <template>
        <el-row>
          <el-col>
            <el-button type="primary" plain icon="Plus">新增</el-button>
          </el-col>
          <el-col>
            <el-button type="success" plain icon="Edit">修改</el-button>
          </el-col>
          <el-col>
            <el-button type="danger" plain>删除</el-button>
          </el-col>
          <el-col>
            <el-button type="warning" plain icon="Download">导出</el-button>
          </el-col>
          <right-toolbar></right-toolbar>
        </el-row>
      </template>

      <el-table>
        <el-table-column type="selection" width="55" align="center" />
        <el-table-column label="角色编号" prop="roleId" width="120" />
        <el-table-column label="角色名称" prop="roleName" width="150" />
        <el-table-column label="权限字符" prop="roleKey" width="200" />
        <el-table-column label="显示顺序" prop="roleSort" width="100" />
        <el-table-column label="状态" align="center" width="100">
          <template="scope">
            <el-switch active-value="0" inactive-value="1"></el-switch>
          </template>
        </el-table-column>
        <el-table-column label="创建时间" align="center" prop="createTime">
          <template="scope">
            <span>（动态文本）</span>
          </template>
        </el-table-column>

        <el-table-column fixed="right" label="操作" width="180">
          <template="scope">
            <el-tooltip content="修改" placement="top">
              <el-button link type="primary" icon="Edit"></el-button>
            </el-tooltip>
            <el-tooltip content="删除" placement="top">
              <el-button link type="primary" icon="Delete"></el-button>
            </el-tooltip>
            <el-tooltip content="数据权限" placement="top">
              <el-button link type="primary" icon="CircleCheck"></el-button>
            </el-tooltip>
            <el-tooltip content="分配用户" placement="top">
              <el-button link type="primary" icon="User"></el-button>
            </el-tooltip>
          </template>
        </el-table-column>
      </el-table>

      <pagination
      />
    </el-card>

    <el-dialog width="500px" append-to-body>
      <el-form label-width="100px">
        <el-form-item label="角色名称" prop="roleName">
          <el-input placeholder="请输入角色名称" />
        </el-form-item>
        <el-form-item prop="roleKey">
          <template>
            <span>
              <el-tooltip content="控制器中定义的权限字符，如：@SaCheckRole('admin')" placement="top">
                <el-icon><question-filled /></el-icon>
              </el-tooltip>
              权限字符
            </span>
          </template>
          <el-input placeholder="请输入权限字符" />
        </el-form-item>
        <el-form-item label="角色顺序" prop="roleSort">
          <el-input-number controls-position="right" />
        </el-form-item>
        <el-form-item label="状态">
          <el-radio-group>
            <el-radio>（动态文本）</el-radio>
          </el-radio-group>
        </el-form-item>
        <el-form-item label="菜单权限">
          <el-checkbox>展开/折叠</el-checkbox>
          <el-checkbox>全选/全不选</el-checkbox>
          <el-checkbox>父子联动</el-checkbox>
          <el-tree
            class="tree-border"
            show-checkbox
            node-key="id"
            empty-text="加载中，请稍候"
          ></el-tree>
        </el-form-item>
        <el-form-item label="备注">
          <el-input type="textarea" placeholder="请输入内容"></el-input>
        </el-form-item>
      </el-form>
      <template>
        <div class="dialog-footer">
          <el-button type="primary">确 定</el-button>
          <el-button>取 消</el-button>
        </div>
      </template>
    </el-dialog>

    <!-- 分配角色数据权限对话框 -->
    <el-dialog width="500px" append-to-body>
      <el-form label-width="80px">
        <el-form-item label="角色名称">
          <el-input />
        </el-form-item>
        <el-form-item label="权限字符">
          <el-input />
        </el-form-item>
        <el-form-item label="权限范围">
          <el-select>
            <el-option></el-option>
          </el-select>
        </el-form-item>
        <el-form-item label="数据权限">
          <el-checkbox>展开/折叠</el-checkbox>
          <el-checkbox>全选/全不选</el-checkbox>
          <el-checkbox>父子联动</el-checkbox>
          <el-tree
            class="tree-border"
            show-checkbox
            default-expand-all
            node-key="id"
            empty-text="加载中，请稍候"
          ></el-tree>
        </el-form-item>
      </el-form>
      <template>
        <div class="dialog-footer">
          <el-button type="primary">确 定</el-button>
          <el-button>取 消</el-button>
        </div>
      </template>
    </el-dialog>
  </div>
