<!-- 来源: src/views/system/notice/index.vue -->
<!-- 已移除 Vue 指令与 {}，仅作静态结构参考 -->

<div class="p-2">
    <transition>
      <div class="mb-[10px]">
        <el-card shadow="hover">
          <el-form>
            <el-form-item label="公告标题" prop="noticeTitle">
              <el-input placeholder="请输入公告标题" clearable />
            </el-form-item>
            <el-form-item label="操作人员" prop="createByName">
              <el-input placeholder="请输入操作人员" clearable />
            </el-form-item>
            <el-form-item label="类型" prop="noticeType">
              <el-select placeholder="公告类型" clearable>
                <el-option />
              </el-select>
            </el-form-item>
            <el-form-item>
              <el-button type="primary" icon="Search">搜索</el-button>
              <el-button icon="Refresh">重置</el-button>
            </el-form-item>
          </el-form>
        </el-card>
      </div>
    </transition>

    <el-card shadow="hover">
      <template>
        <el-row class="mb8">
          <el-col>
            <el-button type="primary" plain icon="Plus">新增</el-button>
          </el-col>
          <el-col>
            <el-button type="success" plain icon="Edit"
              >修改</el-button
            >
          </el-col>
          <el-col>
            <el-button type="danger" plain icon="Delete">
              删除
            </el-button>
          </el-col>
          <right-toolbar></right-toolbar>
        </el-row>
      </template>

      <el-table>
        <el-table-column type="selection" width="55" align="center" />
        <el-table-column label="序号" align="center" prop="noticeId" width="100" />
        <el-table-column label="公告标题" align="center" prop="noticeTitle" />
        <el-table-column label="公告类型" align="center" prop="noticeType" width="100">
          <template="scope">
            <dict-tag />
          </template>
        </el-table-column>
        <el-table-column label="状态" align="center" prop="status" width="100">
          <template="scope">
            <dict-tag />
          </template>
        </el-table-column>
        <el-table-column label="创建者" align="center" prop="createByName" width="100" />
        <el-table-column label="创建时间" align="center" prop="createTime" width="100">
          <template="scope">
            <span>（动态文本）</span>
          </template>
        </el-table-column>
        <el-table-column label="操作" align="center" class-name="small-padding fixed-width">
          <template="scope">
            <el-tooltip content="修改" placement="top">
              <el-button link type="primary" icon="Edit"></el-button>
            </el-tooltip>
            <el-tooltip content="删除" placement="top">
              <el-button link type="primary" icon="Delete"></el-button>
            </el-tooltip>
          </template>
        </el-table-column>
      </el-table>

      <pagination />
    </el-card>
    <!-- 添加或修改公告对话框 -->
    <el-dialog width="780px" append-to-body>
      <el-form label-width="80px">
        <el-row>
          <el-col>
            <el-form-item label="公告标题" prop="noticeTitle">
              <el-input placeholder="请输入公告标题" />
            </el-form-item>
          </el-col>
          <el-col>
            <el-form-item label="公告类型" prop="noticeType">
              <el-select placeholder="请选择">
                <el-option></el-option>
              </el-select>
            </el-form-item>
          </el-col>
          <el-col>
            <el-form-item label="状态">
              <el-radio-group>
                <el-radio>（动态文本）</el-radio>
              </el-radio-group>
            </el-form-item>
          </el-col>
          <el-col>
            <el-form-item label="内容">
              <editor />
            </el-form-item>
          </el-col>
        </el-row>
      </el-form>
      <template>
        <div class="dialog-footer">
          <el-button type="primary">确 定</el-button>
          <el-button>取 消</el-button>
        </div>
      </template>
    </el-dialog>
  </div>
