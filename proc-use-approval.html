<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>领用申请审批 - 新能源物资供应链管理系统</title>
  <link rel="stylesheet" href="css/vendor/fa-all.min.css" />
  <link rel="stylesheet" href="css/subpage-base.css" />
  <link rel="stylesheet" href="css/carrier-management.css" />
  <link rel="stylesheet" href="css/source-navbar-header.css" />
  <style>
    .p-tag{display:inline-flex;padding:2px 8px;border-radius:10px;border:1px solid transparent;font-size:12px}
    .p-tag.wait{background:#fff7e6;border-color:#ffd591;color:#d48806}.p-tag.pass{background:#f6ffed;border-color:#b7eb8f;color:#389e0d}.p-tag.no{background:#fff1f0;border-color:#ffa39e;color:#cf1322}
    .p-kpis{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:10px}.p-k{background:#fff;border:1px solid #e6edf6;border-radius:10px;padding:12px}.p-k b{font-size:12px;color:#5b6b7f;display:block}.p-k span{font-size:20px;color:#1677ff;font-weight:700;display:block;margin-top:6px}
    .p-mask{position:fixed;inset:0;background:rgba(0,0,0,.35);display:none;align-items:center;justify-content:center;z-index:2500}.p-mask.show{display:flex}.p-box{width:min(560px,94vw);background:#fff;border-radius:10px;overflow:hidden}
    .p-hd{padding:12px 16px;border-bottom:1px solid #edf2f8;font-weight:600}.p-bd{padding:12px 16px}.p-ft{padding:10px 16px;border-top:1px solid #edf2f8;display:flex;justify-content:flex-end;gap:8px}
    .p-bd .row{display:grid;grid-template-columns:110px 1fr;gap:8px;align-items:center;margin-bottom:8px;font-size:13px}
    .p-bd textarea{width:100%;min-height:70px;border:1px solid #d9d9d9;border-radius:4px;padding:6px 8px;resize:vertical}
  </style>
</head>
<body class="page-source-navbar page-subpage page-logistics">
  <div class="page-bg" aria-hidden="true"></div>
  <div class="app">
    <header class="header"><div class="header-left"><button class="header-hamburger" aria-label="菜单"><svg viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16"/></svg></button><a class="header-logo" href="#"><img src="assets/logo-chenergy.png" width="220" height="40" alt="" /></a><div class="header-source-brand"><p>新能源供应链管理系统</p></div></div><div class="header-right"><span class="clock" id="clock"></span><div class="user-avatar">用</div></div></header>
    <div class="layout">
      <aside class="sidebar"><div class="nav-item nav-item--module-active"><span class="nav-label">采购管理</span></div></aside>
      <main class="main-scroll"><div class="carrier-main-inner">
        <h1 class="carrier-page-title">领用申请审批（XQ-PROC-4）</h1>
        <div class="p-kpis"><div class="p-k"><b>本月申请</b><span>32</span></div><div class="p-k"><b>待审批</b><span>6</span></div><div class="p-k"><b>已通过</b><span>24</span></div><div class="p-k"><b>未通过</b><span>2</span></div></div>
        <div class="carrier-toolbar"><button class="carrier-btn-add"><i class="fa-solid fa-plus"></i> 新增申请</button><div class="carrier-toolbar-right"><input class="carrier-search" placeholder="申请编号/部门"/><select class="carrier-select"><option>全部状态</option><option>待审批</option><option>已通过</option><option>不通过</option></select><button class="carrier-btn-add">查询</button></div></div>
        <div class="carrier-table-wrap"><table class="carrier-table"><thead><tr><th>申请编号</th><th>申请部门</th><th>申请物资清单</th><th>审批状态</th><th>审批人</th><th>审批时间</th><th>审批意见</th><th>操作</th></tr></thead><tbody id="tb">
          <tr><td>SY-2026-018</td><td>华北运维部</td><td>变流器模块*10、主控柜*2</td><td><span class="p-tag wait">待审批</span></td><td>-</td><td>-</td><td>-</td><td><a href="#" data-a="need" style="color:#1677ff;text-decoration:none;font-weight:500">确认需用</a></td></tr>
        </tbody></table></div>
      </div></main>
    </div>
  </div>
  <div class="p-mask" id="m"><div class="p-box"><div class="p-hd">领用审批</div><div class="p-bd" id="t"></div><div class="p-ft"><button class="carrier-btn-add" id="c">取消</button><button class="carrier-btn-add" id="o">通过</button><button class="carrier-btn-add" id="r">不通过</button></div></div></div>
  <script src="js/sidebar-actions.js"></script><script src="js/subpage-feature-title.js"></script><script src="js/subpage-clock.js"></script>
  <script>
    (function(){
      var tb=document.getElementById("tb"),m=document.getElementById("m"),t=document.getElementById("t"),cur=null;
      function close(){m.classList.remove("show");cur=null;}
      document.getElementById("c").onclick=close;
      m.onclick=function(e){if(e.target===m)close();};
      tb.onclick=function(e){
        var a=e.target.closest("[data-a='need']");
        if(!a)return;
        e.preventDefault();
        cur=a.closest("tr");
        t.innerHTML='<div class="row"><span>申请编号</span><b>'+cur.children[0].textContent+'</b></div>'
          +'<div class="row"><span>申请部门</span><span>'+cur.children[1].textContent+'</span></div>'
          +'<div class="row"><span>申请物资</span><span>'+cur.children[2].textContent+'</span></div>'
          +'<div class="row"><span>审批意见</span><textarea id="opinion" placeholder="请输入审批意见"></textarea></div>';
        m.classList.add("show");
      };
      document.getElementById("o").onclick=function(){
        if(!cur)return;
        var op = (document.getElementById("opinion").value||"").trim() || "同意需用";
        cur.children[3].innerHTML='<span class="p-tag pass">已通过</span>';
        cur.children[4].textContent="当前审批人";
        cur.children[5].textContent=new Date().toISOString().slice(0,16).replace("T"," ");
        cur.children[6].textContent=op;
        cur.children[7].innerHTML='<span style="color:#8c8c8c">已处理</span>';
        close();
      };
      document.getElementById("r").onclick=function(){
        if(!cur)return;
        var op = (document.getElementById("opinion").value||"").trim();
        if(!op){ alert("不通过时请填写审批意见"); return; }
        cur.children[3].innerHTML='<span class="p-tag no">不通过</span>';
        cur.children[4].textContent="当前审批人";
        cur.children[5].textContent=new Date().toISOString().slice(0,16).replace("T"," ");
        cur.children[6].textContent=op;
        cur.children[7].innerHTML='<span style="color:#8c8c8c">已处理</span>';
        close();
      };
    })();
  </script>
</body>
</html>
