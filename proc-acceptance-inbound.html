<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>验收入库 - 新能源物资供应链管理系统</title>
  <link rel="stylesheet" href="css/vendor/fa-all.min.css" />
  <link rel="stylesheet" href="css/subpage-base.css" />
  <link rel="stylesheet" href="css/carrier-management.css" />
  <link rel="stylesheet" href="css/source-navbar-header.css" />
  <style>
    .pa-kpis { display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:10px; margin-bottom:10px; }
    .pa-kpi { background:#fff; border:1px solid #e6edf6; border-radius:10px; padding:12px; }
    .pa-kpi b { display:block; color:#5b6b7f; font-size:12px; }
    .pa-kpi span { display:block; margin-top:6px; color:#1677ff; font-size:20px; font-weight:700; }
    .pa-tag { display:inline-flex; padding:2px 8px; border-radius:10px; font-size:12px; border:1px solid transparent; }
    .pa-tag.pending { background:#fff7e6; color:#d48806; border-color:#ffd591; }
    .pa-tag.done { background:#f6ffed; color:#389e0d; border-color:#b7eb8f; }
    .pa-tag.stock { background:#e6f4ff; color:#0958d9; border-color:#91caff; }
    .pa-ops { display:flex; gap:8px; align-items:center; justify-content:center; }
    .pa-ops .carrier-btn-add { height:28px; padding:0 10px; }
    .pa-modal-mask { position:fixed; inset:0; background:rgba(0,0,0,.35); display:none; align-items:center; justify-content:center; z-index:2400; }
    .pa-modal-mask.show { display:flex; }
    .pa-modal { width:min(560px,94vw); background:#fff; border-radius:10px; overflow:hidden; box-shadow:0 8px 28px rgba(0,0,0,.12); }
    .pa-modal-hd { padding:12px 16px; border-bottom:1px solid #edf2f8; font-size:16px; font-weight:600; color:#1f3551; display:flex; justify-content:space-between; align-items:center; }
    .pa-modal-bd { padding:14px 16px; font-size:13px; color:#44566c; line-height:1.8; }
    .pa-modal-ft { padding:10px 16px; border-top:1px solid #edf2f8; display:flex; justify-content:flex-end; gap:8px; }
  </style>
</head>
<body class="page-source-navbar page-subpage page-logistics">
  <div class="page-bg" aria-hidden="true"></div>
  <div class="app">
    <header class="header">
      <div class="header-left">
        <button type="button" class="header-hamburger" aria-label="菜单"><svg viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16"/></svg></button>
        <a class="header-logo" href="#"><img src="assets/logo-chenergy.png" width="220" height="40" alt="" /></a>
        <div class="header-source-brand"><p>新能源供应链管理系统</p></div>
      </div>
      <div class="header-right"><span class="clock" id="clock"></span><div class="user-avatar">用</div></div>
    </header>
    <div class="layout">
      <aside class="sidebar" aria-label="主导航">
        <div class="nav-item" title="我的资产"><span class="nav-label">我的资产</span></div>
        <div class="nav-item" title="我的任务"><span class="nav-label">我的任务</span></div>
        <a class="nav-item" href="index-portal-screen-alt.html" title="首页"><span class="nav-label">首页</span></a>
        <div class="nav-item" title="驾驶舱"><span class="nav-label">驾驶舱</span></div>
        <div class="nav-item nav-item--module-active" title="采购管理"><span class="nav-label">采购管理</span></div>
      </aside>
      <main class="main-scroll">
        <div class="carrier-main-inner">
          <h1 class="carrier-page-title">验收入库（XQ-PROC-3）</h1>
          <div class="pa-kpis">
            <div class="pa-kpi"><b>本月验收单</b><span>26</span></div>
            <div class="pa-kpi"><b>待验收</b><span>4</span></div>
            <div class="pa-kpi"><b>已验收</b><span>22</span></div>
            <div class="pa-kpi"><b>实库入库率</b><span>94%</span></div>
          </div>
          <div class="carrier-toolbar">
            <button type="button" class="carrier-btn-add"><i class="fa-solid fa-plus"></i> 新增验收单</button>
            <div class="carrier-toolbar-right">
              <input type="search" class="carrier-search" placeholder="验收编号/合同号" />
              <select class="carrier-select"><option>全部状态</option><option>待验收</option><option>已验收</option></select>
              <button type="button" class="carrier-btn-add">查询</button>
            </div>
          </div>
          <div class="carrier-table-wrap">
            <table class="carrier-table">
              <thead><tr><th>验收编号</th><th>关联合同</th><th>发货数量</th><th>实收数量</th><th>验收状态</th><th>验收人</th><th>验收时间</th><th>入库状态</th><th>操作</th></tr></thead>
              <tbody id="tb">
                <tr>
                  <td>YS-2026-001</td><td>HT-2026-301</td><td>120</td><td>118</td>
                  <td><span class="pa-tag pending">待验收</span></td><td>经营发展中心+业务部门</td><td>-</td>
                  <td><span class="pa-tag pending">待入库</span></td>
                  <td><div class="pa-ops"><button class="carrier-btn-add" data-act="ok">确认入库</button><a href="#" class="carrier-op" data-act="detail">查看</a></div></td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </main>
    </div>
  </div>

  <div class="pa-modal-mask" id="confirmMask">
    <div class="pa-modal">
      <div class="pa-modal-hd">确认入库<button type="button" class="carrier-op" id="btnClose">关闭</button></div>
      <div class="pa-modal-bd" id="confirmText"></div>
      <div class="pa-modal-ft"><button type="button" class="carrier-btn-add" id="btnCancel">取消</button><button type="button" class="carrier-btn-add" id="btnOk">确认</button></div>
    </div>
  </div>

  <script src="js/sidebar-actions.js"></script>
  <script src="js/subpage-feature-title.js"></script>
  <script src="js/subpage-clock.js"></script>
  <script>
    (function () {
      var tb = document.getElementById("tb");
      var mask = document.getElementById("confirmMask");
      var txt = document.getElementById("confirmText");
      var pendingTr = null;
      function close() { mask.classList.remove("show"); pendingTr = null; }
      document.getElementById("btnClose").addEventListener("click", close);
      document.getElementById("btnCancel").addEventListener("click", close);
      mask.addEventListener("click", function (e) { if (e.target === mask) close(); });
      tb.addEventListener("click", function (e) {
        var btn = e.target.closest("[data-act='ok']");
        if (!btn) return;
        pendingTr = btn.closest("tr");
        txt.innerHTML = "确认将验收单 <b>" + pendingTr.children[0].textContent + "</b> 标记为“已验收/已入库（实库）”？";
        mask.classList.add("show");
      });
      document.getElementById("btnOk").addEventListener("click", function () {
        if (!pendingTr) return;
        pendingTr.children[4].innerHTML = '<span class="pa-tag done">已验收</span>';
        pendingTr.children[6].textContent = new Date().toISOString().slice(0,16).replace("T"," ");
        pendingTr.children[7].innerHTML = '<span class="pa-tag stock">已入库-实库</span>';
        var btn = pendingTr.querySelector("[data-act='ok']");
        if (btn) { btn.disabled = true; btn.textContent = "已确认"; }
        close();
      });
    })();
  </script>
</body>
</html>
