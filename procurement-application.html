<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <link rel="stylesheet" href="css/subpage-base.css" />
  <link rel="stylesheet" href="css/source-navbar-header.css" />
  <style>
    body.page-procurement-apply .main-scroll { background: #f4f8ff; }
    .pa-title { margin: 0; padding: 16px 20px 10px; font-size: 20px; font-weight: 700; color: #1f1f1f; background: #fff; border-bottom: 1px solid #e8e8e8; }
    .pa-wrap { padding: 12px 16px 20px; }
    .pa-kpis { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 10px; }
    .pa-kpi { background: #fff; border: 1px solid #e8e8e8; border-radius: 8px; padding: 12px; }
    .pa-kpi b { display: block; font-size: 12px; color: #666; }
    .pa-kpi span { display: block; margin-top: 6px; font-size: 22px; color: #1890ff; font-weight: 700; }
    .pa-panel { margin-top: 10px; background: #fff; border: 1px solid #e8e8e8; border-radius: 8px; overflow: hidden; }
    .pa-tabs { display: flex; gap: 0; padding: 0 12px; border-bottom: 1px solid #e8e8e8; background: #fafafa; }
    .pa-tab { height: 38px; border: none; background: transparent; padding: 0 16px; color: #595959; font-size: 13px; cursor: pointer; position: relative; }
    .pa-tab.active { color: #1890ff; font-weight: 700; }
    .pa-tab.active::after { content: ""; position: absolute; left: 10px; right: 10px; bottom: 0; height: 2px; background: #1890ff; border-radius: 2px; }
    .pa-filters { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 10px; padding: 12px 16px 8px; }
    .pa-actions { display: flex; flex-wrap: wrap; gap: 8px; padding: 0 16px 12px; border-bottom: 1px solid #f0f0f0; }
    .pa-btn { height: 32px; border: 1px solid #d9d9d9; background: #fff; border-radius: 4px; padding: 0 14px; cursor: pointer; font-size: 13px; }
    .pa-btn.primary { background: #1890ff; border-color: #1890ff; color: #fff; }
    .pa-btn.add { background: #13c2c2; border-color: #13c2c2; color: #fff; }
    .pa-table-wrap { overflow: auto; padding: 0 16px 10px; }
    .pa-table { width: 100%; min-width: 1400px; border-collapse: collapse; table-layout: fixed; font-size: 12px; }
    .pa-table th, .pa-table td { border: 1px solid #e8e8e8; padding: 8px; text-align: left; vertical-align: middle; }
    .pa-table th { background: #f5f5f5; white-space: nowrap; }
    .pa-op { display: inline-flex; gap: 6px; }
    .pa-op button { border: 1px solid #91caff; background: #e6f4ff; color: #0958d9; border-radius: 4px; height: 24px; padding: 0 8px; font-size: 12px; cursor: pointer; }
    .tag { display: inline-flex; align-items: center; padding: 0 8px; height: 22px; border-radius: 4px; border: 1px solid transparent; font-size: 11px; }
    .tag.pending { background: #fff7e6; border-color: #ffd591; color: #d48806; }
    .tag.passed { background: #e6f4ff; border-color: #91caff; color: #0958d9; }
    .tag.done { background: #f6ffed; border-color: #b7eb8f; color: #389e0d; }
    .tag.reject { background: #fff1f0; border-color: #ffa39e; color: #cf1322; }
    .pa-note { margin: 10px 16px 0; border: 1px dashed #91caff; background: #f0f9ff; color: #0958d9; border-radius: 8px; padding: 10px 12px; font-size: 13px; }

    .pa-custom-select { position: relative; }
    .pa-trigger { height: 32px; border: 1px solid #d9d9d9; border-radius: 4px; background: #fff; padding: 0 10px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; font-size: 13px; }
    .pa-menu { display: none; position: absolute; top: calc(100% + 4px); left: 0; right: 0; z-index: 12; background: #fff; border: 1px solid #d9d9d9; border-radius: 6px; box-shadow: 0 8px 20px rgba(0,0,0,.12); overflow: hidden; }
    .pa-menu.show { display: block; }
    .pa-option { width: 100%; border: none; text-align: left; background: #fff; padding: 8px 10px; border-bottom: 1px solid #f0f0f0; cursor: pointer; }
    .pa-option:last-child { border-bottom: none; }
    .pa-option:hover { background: #f5fbff; }
    .pa-option .main { display: block; font-size: 13px; font-weight: 700; color: #333; }
    .pa-option .sub { display: block; margin-top: 2px; font-size: 11px; color: #8c8c8c; }

    .pa-modal-mask { position: fixed; inset: 0; background: rgba(0,0,0,.35); display: none; align-items: center; justify-content: center; z-index: 2000; padding: 18px; }
    .pa-modal-mask.show { display: flex; }
    .pa-modal { width: min(980px, 100%); max-height: 90vh; background: #fff; border-radius: 8px; overflow: hidden; display: flex; flex-direction: column; }
    .pa-modal.narrow { width: min(680px, 100%); }
    .pa-head, .pa-foot { padding: 12px 16px; border-bottom: 1px solid #f0f0f0; display: flex; align-items: center; justify-content: space-between; }
    .pa-foot { border-bottom: none; border-top: 1px solid #f0f0f0; justify-content: flex-end; gap: 8px; }
    .pa-body { padding: 12px 16px; overflow: auto; }
    .pa-close { border: none; background: transparent; font-size: 22px; color: #8c8c8c; cursor: pointer; }
    .pa-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px 12px; }
    .pa-full { grid-column: 1 / -1; }
    .pa-tip { margin-top: 4px; font-size: 12px; color: #666; background: #f7fbff; border: 1px dashed #91caff; border-radius: 6px; padding: 6px 8px; }
    .pa-mat-table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 8px; }
    .pa-mat-table th, .pa-mat-table td { border: 1px solid #e8e8e8; padding: 6px 8px; text-align: left; }
    .pa-flow { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 8px; margin-top: 10px; }
    .pa-step { text-align: center; border: 1px dashed #d9d9d9; border-radius: 6px; padding: 8px 6px; font-size: 12px; color: #8c8c8c; }
    .pa-step.done { border-style: solid; border-color: #52c41a; color: #389e0d; background: #f6ffed; }
    .pa-step.active { border-style: solid; border-color: #1890ff; color: #0958d9; background: #e6f4ff; }
  </style>
</head>

  <script>
    (function () {
      var PURCHASE_SYNC_KEY = "demoProcurementToPurchaseInfo_v1";
      var rows = [
        { id: 1, no: "PA-2026-001", name: "齿轮箱", category: "生产类", qty: 2, budget: 86000, dept: "供应链管理部", user: "张明", date: "2026-04-08", status: "待审批", spec: "GW-GX-3.2MW", type: "生产类" },
        { id: 2, no: "PA-2026-002", name: "办公电脑", category: "办公类", qty: 8, budget: 76000, dept: "综合管理部", user: "李四", date: "2026-04-06", status: "已通过", spec: "ThinkPad P16", type: "办公类" },
        { id: 3, no: "PA-2026-003", name: "连接器套件", category: "销售类", qty: 120, budget: 50400, dept: "经营发展中心", user: "王芳", date: "2026-04-05", status: "已完成", spec: "CN-88", type: "销售类" },
        { id: 4, no: "PA-2026-004", name: "测试工装", category: "生产类", qty: 15, budget: 18000, dept: "华北运维部", user: "赵强", date: "2026-04-03", status: "已驳回", spec: "TS-20", type: "生产类" }
      ];
      var state = { tab: "all", current: null, categoryFilter: "", filters: { no: "", dept: "", type: "", date: "" } };
      var refs = {
        kpis: document.getElementById("kpis"),
        tabs: Array.prototype.slice.call(document.querySelectorAll(".pa-tab")),
        tbody: document.getElementById("tbody"),
        fNo: document.getElementById("fNo"),
        fDept: document.getElementById("fDept"),
        fType: document.getElementById("fType"),
        fDate: document.getElementById("fDate"),
        fCategoryWrap: document.getElementById("fCategoryWrap"),
        fCategoryTrigger: document.getElementById("fCategoryTrigger"),
        fCategoryMenu: document.getElementById("fCategoryMenu"),
        newMask: document.getElementById("newMask"),
        detailMask: document.getElementById("detailMask"),
        detailBase: document.getElementById("detailBase"),
        detailMaterial: document.getElementById("detailMaterial"),
        detailListPreview: document.getElementById("detailListPreview"),
        mCategoryWrap: document.getElementById("mCategoryWrap"),
        mCategoryTrigger: document.getElementById("mCategoryTrigger"),
        mCategoryMenu: document.getElementById("mCategoryMenu"),
        mCategoryTip: document.getElementById("mCategoryTip")
      };
      function money(v) { return "¥ " + Number(v || 0).toLocaleString("zh-CN", { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
      function tag(status) {
        if (status === "待审批") return '<span class="tag pending">待审批</span>';
        if (status === "已通过") return '<span class="tag passed">已通过</span>';
        if (status === "已完成") return '<span class="tag done">已完成</span>';
        return '<span class="tag reject">已驳回</span>';
      }
      function filteredRows() {
        return rows.filter(function (x) {
          if (state.tab !== "all" && x.status !== state.tab) return false;
          if (state.categoryFilter && x.category !== state.categoryFilter) return false;
          if (state.filters.no && x.no.indexOf(state.filters.no) < 0) return false;
          if (state.filters.dept && x.dept.indexOf(state.filters.dept) < 0) return false;
          if (state.filters.type && x.type !== state.filters.type) return false;
          if (state.filters.date && x.date !== state.filters.date) return false;
          return true;
        });
      }
      function renderKpis() {
        var monthKey = new Date().toISOString().slice(0, 7);
        var monthCount = rows.filter(function (x) { return String(x.date).slice(0, 7) === monthKey; }).length;
        var pending = rows.filter(function (x) { return x.status === "待审批"; }).length;
        var passed = rows.filter(function (x) { return x.status === "已通过"; }).length;
        var amount = rows.reduce(function (s, x) { return s + Number(x.budget || 0); }, 0);
        refs.kpis.innerHTML =
          '<div class="pa-kpi"><b>本月申请数</b><span>' + monthCount + '</span></div>' +
          '<div class="pa-kpi"><b>待审批</b><span>' + pending + '</span></div>' +
          '<div class="pa-kpi"><b>已通过</b><span>' + passed + '</span></div>' +
          '<div class="pa-kpi"><b>采购金额</b><span>' + money(amount) + '</span></div>';
      }
      function renderTable() {
        refs.tbody.innerHTML = "";
        filteredRows().forEach(function (x, i) {
          var op = '<button data-act="detail" data-id="' + x.id + '">查看</button>';
          if (x.status === "待审批") op += '<button data-act="approve" data-id="' + x.id + '">通过</button>';
          var tr = document.createElement("tr");
          tr.innerHTML = "<td>" + (i + 1) + "</td><td>" + x.no + "</td><td>" + x.name + "</td><td>" + x.category + "</td><td>" + x.qty + "</td><td>" + money(x.budget) + "</td><td>" + x.dept + "</td><td>" + x.user + "</td><td>" + x.date + "</td><td>" + tag(x.status) + '</td><td><div class="pa-op">' + op + "</div></td>";
          refs.tbody.appendChild(tr);
        });
      }
      function appendPurchaseSync(item) {
        try {
          var qty = Number(item.qty || 0);
          var totalIn = Number(item.budget || 0);
          var priceIn = qty > 0 ? totalIn / qty : 0;
          var priceEx = priceIn / 1.13;
          var payload = {
            source: "procurement-application",
            requestNo: item.no,
            contractNo: "AUTO-" + item.no,
            dept: item.dept,
            name: item.name,
            spec: item.spec || "-",
            category: item.category,
            qty: qty,
            priceIn: Number(priceIn.toFixed(2)),
            priceEx: Number(priceEx.toFixed(2)),
            remark: "审批通过自动生成采购清单",
            purchaseDate: item.date,
            approvalStatus: "已通过",
            supplier: "待维护",
            inboundStatus: "待入库"
          };
          var raw = localStorage.getItem(PURCHASE_SYNC_KEY);
          var list = raw ? JSON.parse(raw) : [];
          var exists = list.some(function (x) { return x && x.requestNo === payload.requestNo; });
          if (!exists) {
            list.push(payload);
            localStorage.setItem(PURCHASE_SYNC_KEY, JSON.stringify(list));
          }
        } catch (err) {}
      }
      function open(mask) { mask.classList.add("show"); }
      function close(mask) { mask.classList.remove("show"); }
      function closeAll() { close(refs.newMask); close(refs.detailMask); }
      function setCategoryTip(val) {
        if (val === "生产类") refs.mCategoryTip.textContent = "💡 生产类：用于生产运营的物资，如设备备件、维修材料。";
        else if (val === "办公类") refs.mCategoryTip.textContent = "💡 办公类：用于日常办公的物资，如办公用品、办公设备。";
        else refs.mCategoryTip.textContent = "💡 销售类：用于对外销售的物资，即存货。";
      }
      function bindCustomMenu(wrap, trigger, menu, onPick) {
        trigger.addEventListener("click", function (e) { e.stopPropagation(); menu.classList.toggle("show"); });
        menu.querySelectorAll(".pa-option").forEach(function (op) {
          op.addEventListener("click", function () {
            var val = op.getAttribute("data-value") || "";
            var txt = val || "全部类别";
            trigger.innerHTML = txt + ' <i class="fa-solid fa-angle-down"></i>';
            menu.classList.remove("show");
            onPick(val);
          });
        });
        document.addEventListener("click", function (e) { if (!wrap.contains(e.target)) menu.classList.remove("show"); });
      }
      bindCustomMenu(refs.fCategoryWrap, refs.fCategoryTrigger, refs.fCategoryMenu, function (val) { state.categoryFilter = val; renderTable(); });
      bindCustomMenu(refs.mCategoryWrap, refs.mCategoryTrigger, refs.mCategoryMenu, function (val) { setCategoryTip(val); });

      refs.tabs.forEach(function (tab) {
        tab.addEventListener("click", function () {
          state.tab = tab.getAttribute("data-tab");
          refs.tabs.forEach(function (t) { t.classList.remove("active"); });
          tab.classList.add("active");
          renderTable();
        });
      });
      document.getElementById("btnSearch").addEventListener("click", function () {
        state.filters.no = refs.fNo.value.trim();
        state.filters.dept = refs.fDept.value.trim();
        state.filters.type = refs.fType.value;
        state.filters.date = refs.fDate.value;
        renderTable();
      });
      document.getElementById("btnReset").addEventListener("click", function () {
        refs.fNo.value = ""; refs.fDept.value = ""; refs.fType.selectedIndex = 0; refs.fDate.value = "";
        state.filters = { no: "", dept: "", type: "", date: "" };
        state.categoryFilter = "";
        refs.fCategoryTrigger.innerHTML = '全部类别 <i class="fa-solid fa-angle-down"></i>';
        renderTable();
      });
      document.getElementById("btnNew").addEventListener("click", function () {
        document.getElementById("mDate").value = new Date().toISOString().slice(0, 10);
        document.getElementById("mQty").value = 1;
        document.getElementById("mBudget").value = "";
        document.getElementById("mName").value = "";
        document.getElementById("mSpec").value = "";
        document.getElementById("mContract").value = "";
        document.getElementById("mDesc").value = "";
        refs.mCategoryTrigger.innerHTML = '生产类 <i class="fa-solid fa-angle-down"></i>';
        setCategoryTip("生产类");
        open(refs.newMask);
      });
      document.querySelectorAll("[data-close]").forEach(function (btn) { btn.addEventListener("click", closeAll); });
      [refs.newMask, refs.detailMask].forEach(function (mask) { mask.addEventListener("click", function (e) { if (e.target === mask) close(mask); }); });

      document.getElementById("btnSave").addEventListener("click", function () {
        var newRow = {
          id: Date.now(),
          no: "PA-" + new Date().getFullYear() + "-" + String(Math.floor(Math.random() * 900 + 100)),
          name: document.getElementById("mName").value.trim() || "未命名物资",
          category: refs.mCategoryTrigger.textContent.trim().split(" ")[0],
          qty: Number(document.getElementById("mQty").value || 0),
          budget: Number(document.getElementById("mBudget").value || 0),
          dept: document.getElementById("mDept").value,
          user: "当前用户",
          date: document.getElementById("mDate").value || new Date().toISOString().slice(0, 10),
          status: "待审批",
          spec: document.getElementById("mSpec").value.trim() || "-",
          type: document.getElementById("mType").value
        };
        rows.unshift(newRow);
        close(refs.newMask);
        renderKpis();
        renderTable();
      });
      refs.tbody.addEventListener("click", function (e) {
        var act = e.target.getAttribute("data-act");
        if (!act) return;
        var id = Number(e.target.getAttribute("data-id"));
        var item = rows.find(function (x) { return x.id === id; });
        if (!item) return;
        if (act === "detail") {
          refs.detailBase.innerHTML = "<b>申请单号：</b>" + item.no + "<br><b>申请部门：</b>" + item.dept + "<br><b>申请人：</b>" + item.user + "<br><b>申请日期：</b>" + item.date + "<br><b>状态：</b>" + item.status;
          refs.detailMaterial.innerHTML = "<tr><td>" + item.name + "</td><td>" + item.spec + "</td><td>" + item.category + "</td><td>" + item.qty + "</td><td>" + money(item.budget) + "</td></tr>";
          refs.detailListPreview.innerHTML = item.status === "已通过" || item.status === "已完成"
            ? '已生成采购清单预览：<a href="purchase-material-info-management.html" class="pa-link">点击查看同步数据</a>'
            : "审批通过后将生成采购清单预览。";
          open(refs.detailMask);
        } else if (act === "approve") {
          item.status = "已通过";
          appendPurchaseSync(item);
          renderKpis();
          renderTable();
          alert("审批通过后将自动生成采购清单，数据已同步至“物资采购信息页面”（演示）。");
        }
      });

      renderKpis();
      renderTable();
    })();
  </script>
</body>
</html>
