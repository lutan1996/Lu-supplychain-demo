<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>采购汇总表</title>
  <link rel="stylesheet" href="css/subpage-base.css" />
  <link rel="stylesheet" href="css/source-navbar-header.css" />
  <style>
    .subpage-panel{padding:10px 12px 12px;background:#f5f6f8}
    .ps-toolbar{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:8px}
    .ps-left{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
    .ps-left select,.ps-left input{height:30px;border:1px solid #d9d9d9;border-radius:3px;padding:0 8px;font-size:12px;background:#fff}
    .ps-btn{height:30px;border:1px solid #d9d9d9;border-radius:4px;background:#fff;padding:0 12px;font-size:12px;cursor:pointer}
    .ps-btn.pri{background:#1890ff;border-color:#1890ff;color:#fff}
    .subpage-table-wrap{border:1px solid #dde3ea;border-radius:4px;overflow:auto;background:#fff}
    .subpage-table{min-width:1950px;font-size:12px;background:#fff}
    .subpage-table thead tr{background:#f2f5f9}
    .subpage-table th,.subpage-table td{border-bottom:1px solid #edf1f6;padding:8px 8px;text-align:center;white-space:nowrap}
    .subpage-table th{color:#5a6677;font-weight:600}
    .subpage-table a{color:#1677ff;text-decoration:none;font-weight:500}
    .subpage-table a:hover{text-decoration:underline}
    .table-foot{margin-top:8px;font-size:12px;color:#6c7786}
  </style>
</head>
<body class="page-source-navbar page-subpage">
  <div class="app">
    <header class="header"><div class="header-left"><button class="header-hamburger"><svg viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16"/></svg></button><a class="header-logo" href="#"><img src="assets/logo-chenergy.png" width="220" height="40" alt="" /></a><div class="header-source-brand"><p>新能源供应链管理系统</p></div></div><div class="header-right"><span class="clock" id="clock"></span><div class="user-avatar">用</div></div></header>
    <div class="layout">
      <aside class="sidebar"><div class="nav-item"><span class="nav-label">采购管理</span></div></aside>
      <main class="main-scroll">
        <div class="subpage-panel">
          <div class="ps-toolbar">
            <div class="ps-left">
              <select id="year"><option>2026</option><option>2025</option><option>2024</option></select>
              <select id="supplier"><option>全部供应商</option><option>联合动力</option><option>东风</option></select>
              <select id="cat"><option>全部类别</option><option>风机整机</option><option>齿轮箱</option><option>变流器</option></select>
              <button class="ps-btn pri" id="btnQuery">查询</button>
              <button class="ps-btn" id="btnExport">导出Excel</button>
            </div>
            </div>
          <div class="subpage-table-wrap">
            <table class="subpage-table">
              <thead><tr><th>计划编号</th><th>采购部门</th><th>剩余执行数量</th><th>已执行数量</th><th>订单编号</th><th>提报单位</th><th>场站名称</th><th>合同编号</th><th>子合同编号</th><th>供应商</th><th>入库状态</th><th>货物编号</th><th>物资名称</th><th>存放状态</th><th>验收编号</th><th>验收状态</th><th>穿透详情</th></tr></thead>
              <tbody id="reportBody"></tbody>
              </table>
            </div>
          <div class="table-foot">当前默认展示 10 行数据（可继续扩展分页）。</div>
        </div>
      </main>
    </div>
  </div>
  <script src="js/sidebar-actions.js"></script><script src="js/subpage-feature-title.js"></script><script src="js/subpage-clock.js"></script>
  <script>
    const reportRows = [

    renderRows(reportRows);

    document.getElementById("btnQuery").addEventListener("click", function () {
      alert("已按筛选条件更新报表（演示）");
    });
    document.getElementById("btnExport").addEventListener("click", function () {
      alert("已导出采购汇总报表 Excel（演示）");
    });
  </script>
</body>
</html>
