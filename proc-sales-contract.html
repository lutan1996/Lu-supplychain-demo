<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>销售合同管理 - 新能源物资供应链管理系统</title>
  <link rel="stylesheet" href="css/vendor/fa-all.min.css" />
  <link rel="stylesheet" href="css/subpage-base.css" />
  <link rel="stylesheet" href="css/carrier-management.css" />
  <link rel="stylesheet" href="css/source-navbar-header.css" />
  <style>
    .carrier-main-inner{padding:12px 16px 14px}
    .carrier-page-title{margin:0 0 6px;font-size:36px;line-height:1;color:#1f3551;font-weight:700;letter-spacing:-1px}
    .sc-sub{margin:0 0 10px;font-size:15px;color:#41566f}
    .sc-toolbar{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:10px}
    .sc-left{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
    .sc-left input,.sc-left select{height:30px;border:1px solid #d9d9d9;border-radius:4px;padding:0 8px;font-size:12px}
    .sc-btn{height:30px;border:1px solid #d9d9d9;border-radius:4px;background:#fff;padding:0 12px;font-size:12px;cursor:pointer}
    .sc-btn.pri{background:#1890ff;border-color:#1890ff;color:#fff}
    .carrier-table-wrap{border:1px solid #e7ecf3;border-radius:4px;overflow:auto}
    .carrier-table{min-width:1280px;font-size:13px}
    .carrier-table thead tr{background:#f6f8fb}
    .carrier-table th,.carrier-table td{border-bottom:1px solid #edf1f6;padding:10px 8px;text-align:center;white-space:nowrap}
    .carrier-table th{color:#374a60;font-weight:600}
    .sc-op{color:#1677ff;text-decoration:none;font-weight:500}
    .sc-op:hover{text-decoration:underline}
  </style>
</head>
<body class="page-source-navbar page-subpage page-logistics">
  <div class="page-bg" aria-hidden="true"></div>
  <div class="app">
    <header class="header"><div class="header-left"><button class="header-hamburger"><svg viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16"/></svg></button><a class="header-logo" href="#"><img src="assets/logo-chenergy.png" width="220" height="40" alt=""/></a><div class="header-source-brand"><p>新能源供应链管理系统</p></div></div><div class="header-right"><span class="clock" id="clock"></span><div class="user-avatar">用</div></div></header>
    <div class="layout"><aside class="sidebar"><div class="nav-item nav-item--module-active"><span class="nav-label">采购管理</span></div></aside><main class="main-scroll"><div class="carrier-main-inner">
      <h1 class="carrier-page-title">销售合同管理（XQ-PROC-5）</h1>
      <p class="sc-sub">业务部门决定卖不卖，签订销售合同并跟踪履约。</p>
      <div class="sc-toolbar">
        <button class="sc-btn pri"><i class="fa-solid fa-plus"></i> 新增销售合同</button>
        <div class="sc-left">
          <input placeholder="销售合同编号" />
          <select><option>全部状态</option><option>待签订</option><option>已签订</option><option>履约中</option></select>
          <button class="sc-btn pri">查询</button>
        </div>
      </div>
      <div class="carrier-table-wrap"><table class="carrier-table"><thead><tr><th>销售合同编号</th><th>业务部门</th><th>项目公司</th><th>合同物资清单</th><th>合同数量</th><th>合同金额</th><th>签订日期</th><th>合同状态</th><th>操作</th></tr></thead><tbody>
        <tr><td>XS-2026-001</td><td>经营发展中心</td><td>河南能源</td><td>齿轮箱总成*4、变流器模块*10</td><td>14</td><td>1,286,000</td><td>2026-04-15</td><td><span class="tag-status tag-status--to-shelf">履约中</span></td><td><a href="#" class="sc-op">查看详情</a></td></tr>
      </tbody></table></div>
    </div></main></div>
  </div>
  <script src="js/sidebar-actions.js"></script><script src="js/subpage-feature-title.js"></script><script src="js/subpage-clock.js"></script>
</body>
</html>
